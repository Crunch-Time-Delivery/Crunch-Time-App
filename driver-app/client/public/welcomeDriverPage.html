<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome - Driver App</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
  }

  /* Center the welcome content vertically and horizontally */
  #welcomeInline {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #welcomeContent {
    max-width: 350px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    background: #fff;
    text-align: center;
  }

  #welcomeContent img {
    width: 250px;
    height: auto;
    margin-bottom: 20px;
  }

  /* Buttons styling */
  .centered-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px; /* space between buttons */
  }
  .centered-buttons button {
    width: 200px;
    padding: 12px 20px;
    font-size: 1em;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    transition: background-color 0.3s, transform 0.2s;
    font-weight: bold;
  }


  
  /* Buttons styled as links, matching overlay button styles */
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    font-size: 1em;
    cursor: pointer;
    border-radius: 4px;
    border: none;
    text-align: center;
    font-weight: bold;
    transition: background-color 0.3s, color 0.3s;
  }

  /* Style for Create Account and Browser Menu buttons to match overlay buttons */
  .btn-create, .btn-browser {
    background: #f60202; /* red background */
    color: #fff; /* white text */
  }

  /* Optional: hover effects for these buttons */
  .btn-create:hover, .btn-browser:hover {
    background: #c00101;
  }

  /* Style for Login button to match overlay login button styles if needed */
  #loginBtn {
    background: #fff; /* white background */
    color: #f60202; /* red text */
    border: 1px solid #f60202;
  }

  #loginBtn:hover {
    background: #f60202;
    color: #fff;
  }
/*
  /* Specific styles for each button */
  .btn-create {
    background: #f60202; /* red background */
    color: #fff;
  }
  .btn-create:hover {
    background-color: #d00101; /* darker red on hover */
    transform: scale(1.05);
  }

  .btn-login {
    background: #fff; /* white background */
    color: #f60202; /* red text */
    border: 2px solid #f60202; /* border for better visibility */
  }
  .btn-login:hover {
    background-color: #f60202;
    color: #fff;
    transform: scale(1.05);
  }

  .btn-browser {
    background: #f60202; /* red background */
    color: #fff;
  }
  .btn-browser:hover {
    background-color: #d00101; /* darker red on hover */
    transform: scale(1.05);
  }

  /* Terms and Privacy links styling */
  #termsText {
    margin-top: 20px;
    text-align: center;
    font-size: 0.9em;
    color: #555;
  }
  #termsText a {
    color: red;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div id="welcomeInline">
  <div id="welcomeContent">
    <img src="img/screenshot (250).jpg" alt="Welcome Image" />
    <h2 style="color:gray;">Welcome</h2>
    <p>Before enjoying CrunchTime deliveries</p>
    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
      <button  class="btn btn-create" onclick="window.location.href='http://127.0.0.1:5501/driver-app/client/public/registerDriver.html'">Create account</button>
      <button  class="btn" onclick="window.location.href='http://127.0.0.1:5501/driver-app/client/public/Login/loginDriver.html'">Login</button>
      <button class="btn btn-browser" onclick="window.location.href='dummy.html'">Browser Menu</button>
    </div>
    <p id="termsText">
      By logging in or registering, you have agreed to the
      <a href="http://127.0.0.1:5501/driver-app/client/public/terms-and-conditions.page.html" target="_blank">Terms and Conditions</a>
      and
      <a href="dummy_privacy.pdf" target="_blank">Privacy Policy</a>.
    </p>
  </div>/
</div>

</body>
</html>
