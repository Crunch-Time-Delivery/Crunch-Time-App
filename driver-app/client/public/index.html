<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Driver App</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="manifest" href="manifest.json" />
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.1);
}
.driver-label {
  font-weight: bold;
  font-size: 20px;
  color: red;
}
.menu-button {
  background: red;
  color: #fff;
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.menu-container { position: relative; }
.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: #fff;
  min-width: 220px;
  border-radius: 6px;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
  overflow: hidden;
}
.menu-container.show .dropdown-content { display: block; }
.dropdown-content a {
  display: block;
  padding: 12px 15px;
  text-decoration: none;
  color: #333;
  border-bottom: 1px solid #eee;
}
.dropdown-content a:hover { background: #f5f5f5; }
#contentArea {
  max-width: 900px;
  margin: 20px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,.1);
}
.loading, .empty-state {
  text-align: center;
  padding: 40px;
  color: #777;
}
#map {
  width: 100%;
  height: 300px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>
<body>

<div id="contentArea">
  <div class="header" id="mainHeader">
    <div class="driver-label">Driver</div>
    <div class="menu-container" id="menuContainer">
      <button class="menu-button" id="menuButton">Menu ▼</button>
      <div class="dropdown-content" id="dropdownMenu">
        <a href="#" id="orderViewLink">Order View</a>
        <!-- Updated link to open in new tab -->
        <a href="http://127.0.0.1:5501/driver-app/client/public/driver_view_account.html" target="_blank" id="driverAccountLink">Driver View Account</a>
        <a href="#" id="driverHistoryPayment">Driver History Payment</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>
  </div>

  <div id="innerContent">
    <h2>Welcome Driver</h2>
    <p>Select an option from the menu.</p>
  </div>
</div>
<!-- Add this hidden input inside your form -->
<input type="hidden" id="user_location_id" name="user_location_id" />

<!-- Google Maps API with callback -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9sNhi824hNncjfW7HHzaI_s8JtWGfM0Q&callback=initMap" async defer></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const menuContainer = document.getElementById('menuContainer');
  const menuButton = document.getElementById('menuButton');
  const dropdown = document.getElementById('dropdownMenu');

  // Bind menu toggle
  menuButton.addEventListener('click', (e) => {
    e.stopPropagation();
    menuContainer.classList.toggle('show');
  });
  document.addEventListener('click', () => {
    menuContainer.classList.remove('show');
  });
  dropdown.addEventListener('click', (e) => e.stopPropagation());

  // Bind other menu links
  document.getElementById('orderViewLink').onclick = e => { e.preventDefault(); loadOrderView(); };
  document.getElementById('driverHistoryPayment').onclick = e => { e.preventDefault(); loadDriverHistoryPayment(); };
});

// ================= SMS NOTIFICATIONS =================
let isSendingSMS = false;

function showNotificationMessage(text, color = '#333') {
  let box = document.getElementById('notificationMessage');

  if (!box) {
    box = document.createElement('div');
    box.id = 'notificationMessage';
    box.style.position = 'fixed';
    box.style.bottom = '20px';
    box.style.left = '50%';
    box.style.transform = 'translateX(-50%)';
    box.style.padding = '12px 20px';
    box.style.borderRadius = '8px';
    box.style.color = '#fff';
    box.style.fontSize = '14px';
    box.style.zIndex = '9999';
    document.body.appendChild(box);
  }

  box.style.backgroundColor = color;
  box.innerText = text;

  setTimeout(() => box.remove(), 4000);
}
// Function to trigger Twilio notification (assumes backend endpoint `/send-twilio`)
function sendTwilioNotification(phoneNumber, message, callback = null) {
  if (!phoneNumber || !message) {
    showNotificationMessage('Phone number or message missing', '#f44336');
    return;
  }
  
  showNotificationMessage('Sending notification...', '#2196F3');

  fetch('/send-twilio', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ phoneNumber, message })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      showNotificationMessage('Notification sent successfully!', '#4CAF50');
      if (callback && typeof callback === 'function') callback(true, data);
    } else {
      showNotificationMessage('Failed to send notification.', '#f44336');
      if (callback && typeof callback === 'function') callback(false, data);
    }
  })
  .catch(() => {
    showNotificationMessage('Error sending notification.', '#f44336');
    if (callback && typeof callback === 'function') callback(false);
  });
}

// ================= Map Function =================
let map; // Declare map globally
let userMarker;

function initMap() {
  const pickup = { lat: -33.9249, lng: 18.4241 }; // Restaurant
  const dropoff = { lat: -33.9289, lng: 18.4174 }; // Customer
  map = new google.maps.Map(document.getElementById("map"), { zoom: 13, center: pickup });
  new google.maps.Marker({ position: pickup, map, label: 'Pickup Point', title: 'Restaurant Pickup' });
  new google.maps.Marker({ position: dropoff, map, label: 'Drop-off Point', title: 'Customer Drop-off' });

  // Handle geolocation
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (position) => {
        const pos = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        if (!userMarker) {
          userMarker = new google.maps.Marker({ 
            position: pos, 
            map, 
            title: "You are here!", 
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 6,
              fillColor: '#4285F4',
              fillOpacity: 1,
              strokeColor: 'white',
              strokeWeight: 2
            } 
          });
        } else {
          userMarker.setPosition(pos);
        }
        map.setCenter(pos);
        // Save location in hidden input
        document.getElementById("user_location_id").value = pos.lat + "," + pos.lng;
      },
      () => {
        const infoWindow = new google.maps.InfoWindow();
        infoWindow.setPosition(map.getCenter());
        infoWindow.setContent(
          "Error: The Geolocation service failed."
        );
        infoWindow.open(map);
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
    );
  } else {
    const infoWindow = new google.maps.InfoWindow();
    infoWindow.setPosition(map.getCenter());
    infoWindow.setContent("Error: Your browser doesn't support geolocation.");
    infoWindow.open(map);
  }
}

// ================== Load Content Functions ==================
function loadMainPage() {
  document.getElementById('innerContent').innerHTML = `
    <h1>Welcome Driver</h1>
    <p>Select an option from the menu.</p>
  `;
}

async function loadDriverHistoryPayment() {
  const container = document.getElementById('innerContent');
  container.innerHTML = `<div class="loading">Loading payment history…</div>`;
  
  await new Promise(res => setTimeout(res, 1000));
  
  const payments = [
    { id: 'PAYFAST-XXXXXX', amount: 250.00, status: 'Pending' },
    { id: 'PAYFAST-YYYYYY', amount: 150.00, status: 'Completed' },
  ];

  let html = `<h1>Payment History</h1>`;
  payments.forEach(p => {
    html += `
      <div class="card" style="margin-bottom:10px; padding:10px; border:1px solid #ccc;">
        <div><strong>Payment ID:</strong> ${p.id}</div>
        <div><strong>Amount:</strong> R ${p.amount.toFixed(2)}</div>
        <div><strong>Status:</strong> ${p.status}</div>
        <button onclick="trackPayFast('${p.id}')">Track Payment</button>
      </div>
    `;
  });
  container.innerHTML = html;
}
async function trackPayFast(paymentId) {
  try {
    const response = await fetch('/verify-payfast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentId })
    });

    if (!response.ok) {
      throw new Error(`Server responded with status ${response.status}`);
    }

    const data = await response.json();
    alert(`Payment ID: ${paymentId}\nStatus: ${data.status}\nDetails: ${data.details}`);
  } catch (error) {
    console.error('Error verifying payment:', error);
    alert('Error verifying payment.');
  }
}
function loadOrderView() {
  const container = document.getElementById('innerContent');
  if (!container) {
    console.error('Container element not found');
    return;
  }

  const order = {
    id: 'ORD-10045',
    customer: 'John Smith',
    verification: '482913',
    date: '2026-01-21',
    pickup: 'Pizza Palace, Cape Town',
    dropoff: '12 Long Street, Cape Town',
    total: 245.00,
    items: [
      { name: 'Large Pizza', qty: 1, price: 120 },
      { name: 'Chicken Wings', qty: 2, price: 45 },
      { name: 'Cooldrink', qty: 1, price: 35 }
    ]
  };

  container.innerHTML = `
    <h2 style="color: red; border-left: 4px solid red; padding-left: 10px;">Order View</h2>
    <div class="card">
      <div class="row"><strong>Order ID:</strong> ${order.id}</div>
      <div class="row"><strong>Customer:</strong> ${order.customer}</div>
      <div class="row"><strong>Verification:</strong> ${order.verification}</div>
      <div class="row"><strong>Date:</strong> ${order.date}</div>
    </div>
    <div class="card">
      <h3 style="color: red; border-left: 4px solid red; padding-left: 10px;">Order Items</h3>
      ${order.items.map(i => `
        <div class="row">
          <span>${i.name} (x${i.qty})</span>
          <span>R ${(i.qty * i.price).toFixed(2)}</span>
        </div>
      `).join('')}
      <div class="total"><strong>Total:</strong> R ${order.total.toFixed(2)}</div>
    </div>
    <div class="card">
      <h3 style="color: red; border-left: 4px solid red; padding-left: 10px;">Delivery Route</h3>
      <p><strong>Pick-up:</strong> ${order.pickup}</p>
      <p><strong>Drop-off:</strong> ${order.dropoff}</p>
      <div id="map" style="height: 200px; width: 100%; margin-top: 10px; border: 1px solid #ccc;"></div>
      <button style="margin-top: 10px;">Accept / Decline</button>
    </div>`;

  // Initialize the map after the content is loaded
  initMap();
}

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Service worker registered:', reg))
      .catch(err => console.log('Service worker registration failed:', err));
  });
}
</script>
</body>
</html>
