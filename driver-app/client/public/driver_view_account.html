<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Driver View Account</title>
<!-- Include Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
  }
  .card {
    max-width: 400px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  #profileIcon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #fff;
    margin: auto;
    background-size: cover;
    background-position: center;
  }
</style>
</head>
<body>

<div class="card" id="driverAccountContainer">
  <!-- Content will be injected here -->
</div>

<!-- Optional debugging output -->
<div id="output" style="white-space: pre-wrap; margin-top: 20px;"></div>

<script>
  // Initialize Supabase
  const supabaseUrl = 'https://wbpgmgtoyzlnawvsfeiu.supabase.co';
  const supabaseKey = process.env.SUPABASE_KEY; // Replace with your actual key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Retrieve driverId from localStorage
  const driverId = localStorage.getItem('driverId');

  const container = document.getElementById('driverAccountContainer');

  // Display driverId at top
  if (driverId) {
    const driverIdDiv = document.createElement('div');
    driverIdDiv.style.marginBottom = '15px';
    driverIdDiv.innerHTML = `<strong>Driver ID:</strong> ${driverId}`;
    container.appendChild(driverIdDiv);
  } else {
    const msg = document.createElement('div');
    msg.style.color = 'red';
    msg.textContent = 'No Driver ID found. Please register first.';
    container.appendChild(msg);
  }

  // Load driver data from Supabase based on driverId
  async function loadDriverData() {
    if (!driverId) return;

    const { data, error } = await supabase
      .from('Drivers')
      .select(`
        id,
        driver_name,
        contact,
        plate_no,
        email
      `)
      .eq('id', driverId); // assuming 'id' matches driverId

    if (error) {
      document.getElementById('output').textContent = 'Error: ' + error.message;
      return;
    }

    if (data && data.length > 0) {
      const driver = data[0];
      const detailsDiv = document.createElement('div');
      detailsDiv.innerHTML = `
        <div class="row"><strong>Name</strong><span>${driver.driver_name}</span></div>
        <div class="row"><strong>Plate No</strong><span>${driver.plate_no}</span></div>
        <div class="row"><strong>Contact</strong><span>${driver.contact}</span></div>
        <div class="row"><strong>Email</strong><span>${driver.email}</span></div>
        <div class="row"><strong>Driver ID</strong><span>${driver.id}</span></div>
      `;
      container.appendChild(detailsDiv);
    } else {
      const noDataMsg = document.createElement('div');
      noDataMsg.textContent = 'Driver data not found.';
      container.appendChild(noDataMsg);
    }
  }

  loadDriverData();
</script>

</body>
</html>
