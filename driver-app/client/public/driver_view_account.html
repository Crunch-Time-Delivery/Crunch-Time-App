<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Driver View Account</title>
<!-- Include Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
  }
  .card {
    max-width: 400px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="card" id="driverAccountContainer">
  <!-- Profile Upload Circle Centered -->
  <div style="display: flex; justify-content: center; margin-bottom: 20px; flex-direction: column; align-items: center;">
    <label for="profileUpload" style="cursor: pointer;">
      <div id="profileCircle" style="
        width: 100px; height: 100px; border-radius: 50%; background-color: #ccc;
        display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff;
        background-image: url('your-default-image.jpg'); background-size: cover; background-position: center;
      ">
        <span>+</span>
      </div>
    </label>
    <input type="file" id="profileUpload" style="display:none;" accept="image/*" onchange="previewProfileImage(event)">
  </div>

  <!-- Driver Details Display -->
  <div id="driverDetails"   
Name: John Doe
Plate No: ABC1234
Contact: 555-1234
Email: johndoe@example.com
Driver ID: 7890

  </div>
</div>

<!-- Optional debugging output -->
<div id="output" style="white-space: pre-wrap; margin-top: 20px;"></div>

<script>
  // Initialize Supabase
  const supabaseUrl = 'https://wbpgmgtoyzlnawvsfeiu.supabase.co';
  const supabaseKey = 'YOUR_SUPABASE_KEY_HERE'; // Replace with your actual key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Retrieve driverId from localStorage
  const driverId = localStorage.getItem('driverId');

  const detailsDiv = document.getElementById('driverDetails');

  // Function to update profile picture preview
  function previewProfileImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
      document.getElementById('profileCircle').style.backgroundImage = `url(${reader.result})`;
      document.getElementById('profileCircle').innerHTML = '';
    }
    if(event.target.files[0]){
      reader.readAsDataURL(event.target.files[0]);
    }
  }

  // Function to create editable fields
  function createEditableField(labelText, id, value) {
    const wrapper = document.createElement('div');
    wrapper.className = 'row';
    wrapper.style.display = 'flex'; 
    wrapper.style.justifyContent = 'space-between'; 
    wrapper.style.alignItems = 'center';

    const label = document.createElement('strong');
    label.textContent = labelText;

    const input = document.createElement('input');
    input.type = labelText === 'Email' ? 'email' : 'text';
    input.id = id;
    input.value = value;

    wrapper.appendChild(label);
    wrapper.appendChild(input);
    return wrapper;
  }

  // Load driver data from Supabase
  async function loadDriverData() {
    if (!driverId) {
      detailsDiv.innerHTML = '<p style="color:red;">No Driver ID found. Please register first.</p>';
      return;
    }

    const { data, error } = await supabase
      .from('Drivers')
      .select('id, driver_name, contact, plate_no, email')
      .eq('id', driverId);

    if (error) {
      document.getElementById('output').textContent = 'Error: ' + error.message;
      return;
    }

    if (data && data.length > 0) {
      const driver = data[0];

      // Clear previous content
      detailsDiv.innerHTML = '';

      // Create editable fields
      detailsDiv.appendChild(createEditableField('Name', 'driverNameInput', driver.driver_name));
      detailsDiv.appendChild(createEditableField('Plate No', 'driverPlateInput', driver.plate_no));
      detailsDiv.appendChild(createEditableField('Contact', 'driverContactInput', driver.contact));
      detailsDiv.appendChild(createEditableField('Email', 'driverEmailInput', driver.email));
      // Hidden Driver ID
      const hiddenId = document.createElement('input');
      hiddenId.type = 'hidden';
      hiddenId.id = 'driverId';
      hiddenId.value = driver.id;
      detailsDiv.appendChild(hiddenId);

      // Save button
      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save Changes';
      saveBtn.style.marginTop = '15px';
      saveBtn.style.padding = '10px';
      saveBtn.style.backgroundColor = '#4CAF50';
      saveBtn.style.color = '#fff';
      saveBtn.style.border = 'none';
      saveBtn.style.borderRadius = '5px';
      saveBtn.style.cursor = 'pointer';
      saveBtn.onclick = saveDriverInfo;
      detailsDiv.appendChild(saveBtn);
    } else {
      detailsDiv.innerHTML = '<p style="color:red;">Driver data not found.</p>';
    }
  }

  // Save updated info
function saveDriverInfo() {
  const name = document.getElementById('driverNameInput').value;
  const plateNo = document.getElementById('driverPlateInput').value;
  const contact = document.getElementById('driverContactInput').value;
  const email = document.getElementById('driverEmailInput').value;
  const driverIdVal = document.getElementById('driverId').value;

  // Here you can send data to your backend API
  alert('Saved!\n' +
    `Name: ${name}\n` +
    `Plate No: ${plateNo}\n` +
    `Contact: ${contact}\n` +
    `Email: ${email}\n` +
    `Driver ID: ${driverIdVal}`
  );
}

// Load data on page load
loadDriverData();
</script>

</body>
</html>
