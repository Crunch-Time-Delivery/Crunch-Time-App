<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vendor Login</title>
<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    background-color: #f0f0f0; font-family: Arial, sans-serif;
  }
  .window-container {
    background-color: #fff; padding: 30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2);
    max-width: 400px; width:90%;
  }
  /* Notification styles */
  .notification {
    position: fixed; top:20px; right:20px; padding:12px 20px; border-radius:5px; display:none; z-index:9999;
  }
  .notification.success { background:#4CAF50; color:#fff; }
  .notification.error { background:#f44336; color:#fff; }
  /* Modal styles */
  .modal {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;
  }
  .modal-box {
    background: #fff; padding:20px; border-radius:8px; max-width:400px; width:90%; text-align:center;
  }
  input { width:80%; padding:8px; margin:10px 0; border:1px solid #ccc; border-radius:4px; }
  button {
    padding:10px 20px; margin-top:10px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;
  }
</style>
</head>
<body>

<div class="window-container">
  <!-- OTP Modal -->
  <div id="otpModal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>Verify OTP</h3>
      <p>Enter the 6-digit code sent to your email/phone</p>
      <input id="otpInput" placeholder="OTP" />
      <button style="background:#f44336; color:#fff;" onclick="verifyOTP()">Verify</button>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal" style="display:flex;">
    <div class="modal-box">
      <h2>Vendor Login</h2>
      <label for="username">Email</label>
      <input id="username" placeholder="Email" />
      <label for="password">Password</label>
      <input id="password" placeholder="Password" type="password" />
      <div style="text-align:right;"><a id="loginForgotPassword" href="#">Forgot Password?</a></div>
      <button style="background:#f44336; color:#fff;" id="loginBtn">Login</button>
      <p>Don't have an account? <a href="#" id="registerLink">Register here</a></p>
    </div>
  </div>
</div>

<!-- Password Reset Skeleton -->
<div class="modal" id="passwordResetModal">
  <div class="modal-box">
    <h3>Password Reset</h3>
    <input id="resetEmail" placeholder="Enter your email" />
    <button id="sendResetBtn" style="background:#f44336; color:#fff;">Send Reset Email</button>
  </div>
</div>

<div id="notification" class="notification"></div>

<script>
const supabaseUrl='https://wbpgmgtoyzlnawvsfeiu.supabase.co';
const supabaseKey='YOUR_SUPABASE_PUBLIC_ANON_KEY'; // replace with your key
const supabase = supabase.createClient(supabaseUrl,supabaseKey);

let currentUser=null;
let currentOTP='';

function showNotification(msg, type='success') {
  const notif = document.getElementById('notification');
  notif.innerText=msg;
  notif.className='notification '+type;
  notif.style.display='block';
  setTimeout(()=>{ notif.style.display='none'; }, 3000);
}

function showModal(id) { document.getElementById(id).style.display='flex'; }
function hideModal(id) { document.getElementById(id).style.display='none'; }

let isRegister=false;
document.getElementById('registerLink').onclick=(e)=>{
  e.preventDefault(); isRegister=!isRegister; buildForm(); 
};
function buildForm() {
  const container=document.getElementById('authForm');
  if (isRegister) {
    document.querySelector('#authTitle').innerText='Register';
    document.getElementById('authBtn').innerText='Register';
    container.innerHTML=`
      <label>Email</label><input id="regEmail" placeholder="Email"/>
      <label>Password</label><input id="regPass" placeholder="Password" type="password"/>
    `;
  } else {
    document.querySelector('#authTitle').innerText='Login';
    document.getElementById('authBtn').innerText='Login';
    container.innerHTML=`
      <label>Email</label><input id="regEmail" placeholder="Email"/>
      <label>Password</label><input id="regPass" placeholder="Password" type="password"/>
    `;
  }
}
buildForm();

document.getElementById('authBtn').onclick=async()=>{
  const email=document.getElementById('regEmail').value.trim().toLowerCase();
  const pass=document.getElementById('regPass').value.trim();

  if (isRegister) {
    // Register
    // For demo, store in localStorage
    let users=JSON.parse(localStorage.getItem('users')) || [];
    if(users.some(u=>u.email===email)){ showNotification('Email exists','error'); return; }
    users.push({ email, pass, role:'vendor', approved:false });
    localStorage.setItem('users', JSON.stringify(users));
    showNotification('Registration success! Please login.');
    isRegister=false; buildForm();
  } else {
    // Login
    // check hardcoded admin (remove if not needed)
    // Check local storage for users
    const users=JSON.parse(localStorage.getItem('users'))||[];
    const user=users.find(u=>u.email===email && u.pass===pass);
    if (user) {
      currentUser=user;
      if (user.role==='vendor') {
        if (user.approved) {
          window.location='vendor_mainpage.html';
        } else {
          generateOTP();
          showModal('otpModal');
        }
      }
    } else {
      showNotification('Invalid credentials','error');
    }
  }
};

function generateOTP() {
  currentOTP=Math.floor(100000 + Math.random()*900000).toString();
  alert('Your OTP (for demo): '+currentOTP);
  // TODO: Call your backend for Twilio SMS
}

document.getElementById('verifyOtpBtn').onclick=()=>{
  const inputOtp=document.getElementById('otpInput').value.trim();
  if (inputOtp===currentOTP) {
    alert('OTP verified! Account approved.');
    currentUser.approved=true;
    // Save update
    let users=JSON.parse(localStorage.getItem('users'))||[];
    const idx=users.findIndex(u=>u.email===currentUser.email);
    if (idx!==-1) { users[idx]=currentUser; }
    localStorage.setItem('users',JSON.stringify(users));
    hideModal('otpModal');
    window.location='vendor_mainpage.html';
  } else {
    alert('Incorrect OTP.');
  }
};

document.getElementById('resendOtpBtn').onclick=()=>{
  generateOTP();
  alert('OTP resent.');
};

document.getElementById('loginForgotPassword').onclick=(e)=>{
  e.preventDefault(); showModal('passwordResetModal');
};

document.getElementById('sendResetBtn').onclick=async()=>{
  const email=document.getElementById('resetEmail').value.trim().toLowerCase();
  const { data, error }=await supabase.auth.resetPasswordForEmail(email,{ redirectTo:'your-reset-page.html' });
  if (error) { showNotification('Error: '+error.message,'error'); }
  else { showNotification('Reset email sent'); hideModal('passwordResetModal'); }
};

// Show login modal on load
window.onload=()=>{ document.getElementById('loginModal').style.display='flex'; };
</script>
</body>
</html>
