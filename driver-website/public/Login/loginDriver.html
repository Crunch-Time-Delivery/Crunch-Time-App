<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login/Registration</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  /* Modal styles */
  .modal {
    display: none; 
    position: fixed; 
    z-index: 2000; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    overflow: auto; 
    background-color: rgba(0,0,0,0.4);
  }
  .modal-content {
    background-color: #fff;
    margin: 15% auto; 
    padding: 20px;
    border-radius: 8px;
    width: 350px;
    text-align: center;
  }
  .modal input {
    width: 80%;
    padding: 8px;
    margin-top: 10px;
  }
  .modal button {
    margin-top: 15px;
    padding: 8px 12px;
    cursor: pointer;
  }
  #buttonContainer {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .redirectBtn {
    background-color: red;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
  }
  .redirectBtn:hover {
    opacity: 0.8;
  }
  #loginForgotPassword {
    display: block;
    text-align: center;
    margin: 10px auto;
    cursor: pointer;
    color: blue;
    text-decoration: underline;
    font-size: 14px;
  }
  /* Notification styles */
  .notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 5px;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 9999;
  }
  .success { background-color: #4BB543; }
  .error { background-color: #FF4136; }
</style>
</head>
<body>

<!-- Container for dynamic content -->
<div id="innerContent"></div>

<!-- Login/Register Modal Structure -->
<div id="loginModal" class="modal">
  <div class="modal-content" id="authContent">
    <h2 id="authTitle">Login</h2>
    <div id="authForm">
      <!-- Dynamic form fields will be inserted here -->
    </div>
    <div style="margin-top:10px;">
      <button style="background-color:red; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer; width:100%;" id="authSubmitBtn">Login</button>
    </div>
    <a id="switchAuth" href="#" style="font-size:14px; display:block; margin-top:10px;">Don't have an account? Register</a>
    <a id="forgotPasswordLink" href="#" style="font-size:14px; display:block; margin-top:10px;">Forgot Password?</a>
  </div>
</div>

<!-- OTP Modal -->
<div id="otpModal" class="modal">
  <div class="modal-content">
    <h3>Verify Account</h3>
    <p>Please enter the OTP sent to your email or phone</p>
    <input type="text" id="otpInput" maxlength="4" placeholder="Enter OTP" />
    <div style="margin-top:10px;">
      <button id="verifyOtpBtn">Confirm</button>
      <button id="resendOtpBtn">Resend OTP</button>
    </div>
  </div>
</div>

<!-- Password Recovery Modal -->
<div id="recoverModal" class="modal">
  <div class="modal-content">
    <h3>Reset Password</h3>
    <p>Enter your email to reset password</p>
    <input type="email" id="recoverEmail" placeholder="Email" />
    <button id="recoverBtn" style="margin-top:10px;">Reset Password</button>
  </div>
</div>

<script>
/* Helper to show notifications */
function showNotification(message, type='success') {
  const notif = document.createElement('div');
  notif.className = 'notification ' + (type === 'success' ? 'success' : 'error');
  notif.innerText = message;
  document.body.appendChild(notif);
  requestAnimationFrame(() => { notif.style.opacity = 1; });
  setTimeout(() => {
    notif.style.opacity = 0;
    notif.addEventListener('transitionend', () => {
      if (notif.parentNode) notif.remove();
    });
  }, 3000);
}

// Storage key for registered users
const USERS_KEY = 'users';

// Initialize users data if not exist
if (!localStorage.getItem(USERS_KEY)) {
  // Example admin user (removed as per request)
  // For driver registration, user data will be stored dynamically
  localStorage.setItem(USERS_KEY, JSON.stringify([]));
}

// Utility functions
function getUsers() {
  return JSON.parse(localStorage.getItem(USERS_KEY)) || [];
}

function saveUser(user) {
  const users = getUsers();
  users.push(user);
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

function findUserByEmail(email) {
  const users = getUsers();
  return users.find(u => u.email.toLowerCase() === email.toLowerCase());
}

function updateUser(email, data) {
  const users = getUsers();
  const index = users.findIndex(u => u.email.toLowerCase() === email.toLowerCase());
  if (index !== -1) {
    users[index] = { ...users[index], ...data };
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }
}

// Current user and OTP management
let currentUser = null;
let generatedOtp = '';
let otpVerified = false;

// Modal handling
const loginModal = document.getElementById('loginModal');
const otpModal = document.getElementById('otpModal');
const recoverModal = document.getElementById('recoverModal');

function showModal(modal) { modal.style.display='block'; }
function hideModal(modal) { modal.style.display='none'; }

// Main variables
let isRegistering = false; // toggle between login and register mode

// Build form dynamically
function buildAuthForm() {
  const formContainer = document.getElementById('authForm');
  formContainer.innerHTML = '';

  if (isRegistering) {
    // Registration form
    formContainer.innerHTML = `
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Email" />
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password" />
      <label>Role</label>
      <select id="authRole">
        <option value="driver">Driver</option>
        <!-- No admin role here -->
      </select>
    `;
    document.getElementById('authTitle').innerText = 'Register';
    document.getElementById('authSubmitBtn').innerText = 'Register';
    document.getElementById('switchAuth').innerText = 'Already have an account? Login';
    document.getElementById('forgotPasswordLink').style.display='none';
  } else {
    // Login form
    formContainer.innerHTML = `
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Email" />
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password" />
    `;
    document.getElementById('authTitle').innerText = 'Login';
    document.getElementById('authSubmitBtn').innerText = 'Login';
    document.getElementById('switchAuth').innerText = "Don't have an account? Register";
    document.getElementById('forgotPasswordLink').style.display='block';
  }
}

// Initialize form
buildAuthForm();

// Switch between login and registration
document.getElementById('switchAuth').addEventListener('click', (e) => {
  e.preventDefault();
  isRegistering = !isRegistering;
  buildAuthForm();
});

// Forgot password link
document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
  e.preventDefault();
  showModal(recoverModal);
});

// Handle password recovery
document.getElementById('recoverBtn').addEventListener('click', () => {
  const email = document.getElementById('recoverEmail').value.trim();
  const user = findUserByEmail(email);
  if (user) {
    alert(`Password reset link sent to ${email} (simulate sending email).`);
    hideModal(recoverModal);
  } else {
    alert('Email not found.');
  }
});

// Register or login button
document.getElementById('authSubmitBtn').addEventListener('click', () => {
  const email = document.getElementById('authEmail').value.trim().toLowerCase();
  const password = document.getElementById('authPassword').value.trim();

  if (isRegistering) {
    // Registration flow
    if (!email || !password) {
      alert('Please fill all fields.');
      return;
    }
    if (findUserByEmail(email)) {
      alert('Email already registered.');
      return;
    }
    const role = document.getElementById('authRole').value;
    const newUser = { email, password, role, approved: false };
    saveUser(newUser);
    alert('Registration successful! You can now login.');
    isRegistering = false;
    buildAuthForm();
  } else {
    // Login flow
    if (!email || !password) {
      alert('Please fill all fields.');
      return;
    }
    const user = findUserByEmail(email);
    if (!user) {
      alert('User not found.');
      return;
    }
    if (user.password !== password) {
      alert('Incorrect password.');
      return;
    }
    // Save current user
    currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));

    // Role-based access
    if (user.role === 'driver') {
      if (user.approved) {
        window.location.href='http://127.0.0.1:5501/driver-app/client/public/mainpage.html';
      } else {
        generateAndSendOtp(user);
        showOtpModal();
      }
    } else {
      alert('Unknown role.');
    }
  }
});

// Generate OTP placeholder (simulate Twilio)
function generateAndSendOtp(user) {
  generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
  alert(`OTP sent to ${user.email}. (OTP: ${generatedOtp})`);
  // TODO: call your backend API to send SMS via Twilio
  // fetch('/send-otp', { method: 'POST', body: JSON.stringify({ to: user.contact, otp: generatedOtp }) ... });
}

// OTP verification
document.getElementById('verifyOtpBtn').addEventListener('click', () => {
  const enteredOtp = document.getElementById('otpInput').value.trim();
  if (enteredOtp === generatedOtp) {
    otpVerified = true;
    alert('OTP verified! Your account is now approved.');
    // Mark user as approved
    if (currentUser) {
      updateUser(currentUser.email, { approved: true });
      window.location.href='http://127.0.0.1:5501/driver-app/client/public/mainpage.html';
    }
    hideModal(otpModal);
  } else {
    alert('Incorrect OTP.');
  }
});

// Resend OTP
document.getElementById('resendOtpBtn').addEventListener('click', () => {
  if (currentUser) {
    generateAndSendOtp(currentUser);
  }
});

// Show login/register modal on page load
window.onload = () => {
  showModal(loginModal);
};
</script>
</body>
</html>
