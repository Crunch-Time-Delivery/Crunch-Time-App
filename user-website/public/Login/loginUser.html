<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Login & Registration</title>
<style>
  /* Basic styling for modals and buttons */
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
  }
  .modal {
    display: none; 
    position: fixed; 
    z-index: 2000; 
    left: 0; top: 0;
    width: 100%; height: 100%; overflow: auto;
    background-color: rgba(0,0,0,0.4);
  }
  .modal-content {
    background: #fff; margin: 15% auto; padding: 20px; border-radius: 8px; width: 350px; text-align: center;
  }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 80%; padding: 8px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px;
  }
  button {
    margin-top: 15px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
  }
  #notification {
    position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 4px; display: none; z-index: 9999;
  }
  #notification.success { background-color: #4CAF50; color: #fff; }
  #notification.error { background-color: #f44336; color: #fff; }
</style>
<!-- Include Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
</head>
<body>

<!-- Notification container -->
<div id="notification"></div>

<!-- Main Content: Login/Register Modal -->
<div id="authModal" class="modal">
  <div class="modal-content" id="authContainer">
    <h2 id="authTitle">Login</h2>
    <div id="authForm"></div>
    <button id="authActionBtn">Login</button>
    <p><a href="#" id="toggleAuth">Don't have an account? Register</a></p>
    <p><a href="#" id="forgotPasswordLink">Forgot Password?</a></p>
  </div>
</div>

<!-- OTP Verification Modal -->
<div id="otpModal" class="modal">
  <div class="modal-content">
    <h3>OTP Verification</h3>
    <p>Enter the 4-digit code sent to your email or phone.</p>
    <input type="text" id="otpInput" maxlength="4" placeholder="Enter OTP" />
    <button id="verifyOtpBtn">Verify</button>
    <button id="resendOtpBtn">Resend OTP</button>
  </div>
</div>

<!-- Password Reset Skeleton Modal -->
<div id="resetPasswordModal" class="modal">
  <div class="modal-content">
    <h3>Reset Password</h3>
    <p>Enter your email to receive reset instructions.</p>
    <input type="email" id="resetEmail" placeholder="Email" />
    <button id="sendResetBtn">Send Reset Email</button>
  </div>
</div>

<script>
const supabaseUrl = 'https://wbpgmgtoyzlnawvsfeiu.supabase.co'; // your URL
const supabaseKey = 'YOUR_SUPABASE_PUBLIC_ANON_KEY'; // replace with your key
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let otpCode = '';
let otpTimer = null;

const notification = document.getElementById('notification');

// Utility for notifications
function showNotification(msg, type='success') {
  notification.innerText = msg;
  notification.className = type;
  notification.style.display = 'block';
  setTimeout(() => { notification.style.display = 'none'; }, 3000);
}

// Modal control
function showModal(id) { document.getElementById(id).style.display='block'; }
function hideModal(id) { document.getElementById(id).style.display='none'; }

// User data stored in localStorage for demo
function getUserData() {
  return JSON.parse(localStorage.getItem('registeredUsers')) || [];
}
function saveUserData(user) {
  const users = getUserData();
  users.push(user);
  localStorage.setItem('registeredUsers', JSON.stringify(users));
}

// Build registration/login form
let isRegister = false;
function buildAuthForm() {
  const container = document.getElementById('authForm');
  container.innerHTML = '';

  if (isRegister) {
    document.getElementById('authTitle').innerText = 'Register';
    document.getElementById('authActionBtn').innerText = 'Register';
    document.getElementById('toggleAuth').innerText = 'Already have an account? Login';
    container.innerHTML = `
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Email" />
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password" />
      <label>Role</label>
      <select id="authRole">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    `;
  } else {
    document.getElementById('authTitle').innerText = 'Login';
    document.getElementById('authActionBtn').innerText = 'Login';
    document.getElementById('toggleAuth').innerText = "Don't have an account? Register";
    container.innerHTML = `
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Email" />
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Password" />
    `;
  }
}
buildAuthForm();

// Toggle between Login/Register
document.getElementById('toggleAuth').addEventListener('click', e => {
  e.preventDefault();
  isRegister = !isRegister;
  buildAuthForm();
});

// Login/Register submit handler
document.getElementById('authActionBtn').addEventListener('click', async () => {
  const email = document.getElementById('authEmail').value.trim().toLowerCase();
  const password = document.getElementById('authPassword').value.trim();
  if (isRegister) {
    // Register new user
    const role = document.getElementById('authRole').value;
    const users = getUserData();
    if (users.some(u => u.email === email)) {
      showNotification('Email already registered.', 'error');
      return;
    }
    saveUserData({ email, password, role, approved: role !== 'user' }); // admin auto-approve for demo
    showNotification('Registration successful. Please login.');
    isRegister = false;
    buildAuthForm();
  } else {
    // Login process
    const users = getUserData();
    const user = users.find(u => u.email === email);
    if (!user || user.password !== password) {
      showNotification('Invalid credentials.', 'error');
      return;
    }
    currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));
    if (user.role === 'admin') {
      window.location.href = 'admin_dashboard.html'; // your admin page
    } else if (user.role === 'user') {
      if (user.approved) {
        window.location.href = 'user_mainpage.html'; // your user page
      } else {
        generateAndSendOtp(user);
        showModal('otpModal');
      }
    }
  }
});

// OTP Verification logic (placeholder for Twilio integration)
function generateAndSendOtp(user) {
  otpCode = Math.floor(1000 + Math.random() * 9000).toString();
  alert(`OTP sent to ${user.email} (simulate). OTP: ${otpCode}`);
  // TODO: Call your backend API to send OTP via Twilio
}

document.getElementById('verifyOtpBtn').addEventListener('click', () => {
  const entered = document.getElementById('otpInput').value.trim();
  if (entered === otpCode) {
    alert('OTP verified! Your account is now approved.');
    // Mark user as approved
    currentUser = JSON.parse(localStorage.getItem('currentUser'));
    currentUser.approved = true;
    // Save updated user data
    const users = getUserData();
    const index = users.findIndex(u => u.email === currentUser.email);
    if (index !== -1) {
      users[index] = currentUser;
      localStorage.setItem('registeredUsers', JSON.stringify(users));
    }
    hideModal('otpModal');
    // Redirect to user page
    window.location.href='user_mainpage.html';
  } else {
    alert('Incorrect OTP.');
  }
});

document.getElementById('resendOtpBtn').addEventListener('click', () => {
  if (currentUser) generateAndSendOtp(currentUser);
});

// Forgot Password link
document.getElementById('forgotPasswordLink').addEventListener('click', () => {
  showModal('resetPasswordModal');
});

// Send password reset
document.getElementById('sendResetBtn').addEventListener('click', async () => {
  const email = document.getElementById('resetEmail').value.trim().toLowerCase();
  if (!email) {
    showNotification('Please enter your email.', 'error');
    return;
  }
  const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: 'user_reset_password.html' // your reset page
  });
  if (error) {
    showNotification('Error: ' + error.message, 'error');
  } else {
    showNotification('Password reset email sent.');
    hideModal('resetPasswordModal');
  }
});
async function sendOTP() {
    const phone = document.getElementById('phone').value;
    await fetch('/send-verification', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ phoneNumber: phone })
    });
    alert('Code Sent!');
}

async function verifyOTP() {
    const phone = document.getElementById('phone').value;
    const code = document.getElementById('code').value;
    const response = await fetch('/verify-otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ phoneNumber: phone, code: code })
    });
    const result = await response.json();
    alert(result.verified ? 'Verified!' : 'Invalid Code');
}

// On page load
window.onload = () => {
  // Show login modal initially
  document.getElementById('authModal').style.display='block';
};
</script>
</body>
</html>
