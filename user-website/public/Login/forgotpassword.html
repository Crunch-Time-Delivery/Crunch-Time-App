<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password & Reset</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
  }
  .container {
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
  }
  h2 {
    margin-bottom: 20px;
  }
  input[type="email"],
  input[type="password"] {
    width: 80%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #ff0000;
    color:#fff;
    border:none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background-color: #b30000;
  }
  #message {
    margin-top: 20px;
    font-size: 14px;
  }
</style>
<!-- Include Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
</head>
<body>

<div class="container" id="forgot-password-container" style="display: block;">
  <img src="img/screenshot (251).jpg" alt="Welcome Image" style="width:250px; height:auto; margin-bottom:20px;">
  <h2>Forgot Password</h2>
  <p>Enter your email address to reset your password.</p>
  <input type="email" id="forgotEmail" placeholder="Email" />
  <br />
  <button id="resetBtn">Reset Password</button>
  <div id="message"></div>
</div>

<div class="container" id="reset-password-container" style="display: none;">
  <h2>Set New Password</h2>
  <input type="password" id="newPassword" placeholder="New Password" />
  <br />
  <button id="updatePasswordBtn">Update Password</button>
  <div id="updateMessage"></div>
</div>

<script>
  // Your Supabase URL and Key
  const supabaseUrl = 'https://wbpgmgtoyzlnawvsfeiu.supabase.co';
  const supabaseKey = process.env.SUPABASE_KEY; // replace with your actual key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Elements
  const forgotPasswordContainer = document.getElementById('forgot-password-container');
  const resetPasswordContainer = document.getElementById('reset-password-container');
  const messageDiv = document.getElementById('message');
  const updateMessageDiv = document.getElementById('updateMessage');

  // Handle password reset request
  document.getElementById('resetBtn').addEventListener('click', () => {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) {
      messageDiv.style.color = 'red';
      messageDiv.textContent = 'Please enter your email address.';
      return;
    }
    handleForgotPassword(email);
  });

  async function handleForgotPassword(email) {
    const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'http://yourdomain.com/resetpassword.html' // replace with your reset password page URL
    });
    if (error) {
      console.error('Error sending reset email:', error.message);
      messageDiv.style.color = 'red';
      messageDiv.textContent = 'Error: ' + error.message;
    } else {
      console.log('Password reset email sent successfully!');
      messageDiv.style.color = 'black';
      messageDiv.textContent = `A password reset link has been sent to ${email}.`;
    }
  }

  // Detect if URL has access_token or error (reset flow)
  function checkResetFlow() {
    const urlParams = new URLSearchParams(window.location.search);
    const accessToken = urlParams.get('access_token');
    if (accessToken) {
      // Show the new password form
      forgotPasswordContainer.style.display = 'none';
      resetPasswordContainer.style.display = 'block';

      // Store access token for update
      window.resetAccessToken = accessToken;
    }
  }

  // Handle updating new password
  document.getElementById('updatePasswordBtn').addEventListener('click', async () => {
    const newPassword = document.getElementById('newPassword').value.trim();
    if (!newPassword) {
      updateMessageDiv.style.color = 'red';
      updateMessageDiv.textContent = 'Please enter a new password.';
      return;
    }
    await updateNewPassword(newPassword);
  });

  async function updateNewPassword(newPassword) {
    try {
      const { data, error } = await supabase.auth.updateUser({ password: newPassword });
      if (error) {
        console.error('Error updating password:', error.message);
        updateMessageDiv.style.color = 'red';
        updateMessageDiv.textContent = 'Error: ' + error.message;
      } else {
        console.log('Password updated successfully for user:', data.user.email);
        updateMessageDiv.style.color = 'green';
        updateMessageDiv.textContent = 'Your password has been updated successfully.';
        // Optionally, redirect to login page
      }
    } catch (err) {
      console.error('Unexpected error:', err);
      updateMessageDiv.style.color = 'red';
      updateMessageDiv.textContent = 'An unexpected error occurred.';
    }
  }

  // On page load, check if in reset flow
  window.onload = checkResetFlow;
</script>

</body>
</html>
