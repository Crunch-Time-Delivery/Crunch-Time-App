<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Delivery Location</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .search-location-container {
      max-width: 600px;
      margin: 0 auto;
    }
    .title-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      flex: 1;
    }
    .red-column {
      width: 20px;
      height: 20px;
      background-color: red;
      margin-left: 10px;
      border-radius: 3px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    #map {
      height: 400px;
      width: 100%;
      margin-top: 20px;
    }
    .buttons-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      justify-content: center;
    }
    #coordinates {
      margin-top: 10px;
      text-align: center;
    }
    /* Optional: display live connection link somewhere */
    #connectionLink {
      margin-top: 15px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="search-location-container">
  <div class="title-row">
    <h1>Search Delivery Location</h1>
    <div class="red-column"></div>
  </div>

  <form id="locationForm">
    <input type="text" id="locationInput" placeholder="Enter address or city" required />
    <input type="hidden" id="user_id_location" /> <!-- Hidden input for user location ID -->
    <button type="submit" id="setLocationBtn">Set Location</button>
  </form>

  <div class="buttons-group">
    <button type="button" id="locateBtn">Use My Location</button>
    <button type="button" id="resetBtn">Reset Map</button>
  </div>

  <!-- Map -->
  <div id="map"></div>
  <div id="coordinates">No location selected.</div>

  <!-- Optional display of live connection URL -->
  <div id="connectionLinkContainer">
    <strong>Live Connection URL:</strong>
    <div id="connectionLink" style="word-break: break-all;"></div>
  </div>
</div>

<!-- Google Maps API with callback -->
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9sNhi824hNncjfW7HHzaI_s8JtWGfM0Q&callback=initMap"
></script>

<script>
let map, marker, geocoder;
const DEFAULT_POS = { lat: -33.9249, lng: 18.4241 };

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: DEFAULT_POS,
    zoom: 13
  });
  marker = new google.maps.Marker({ map: map, position: DEFAULT_POS, draggable: true });
  geocoder = new google.maps.Geocoder();
  loadSavedLocation();

  // Event listeners
  document.getElementById("locationForm").addEventListener("submit", e => {
    e.preventDefault();
    const address = document.getElementById("locationInput").value.trim();
    if (!address) { alert("Please enter an address."); return; }
    geocodeAddress(address);
  });

  document.getElementById("locateBtn").addEventListener("click", () => {
    if (!navigator.geolocation) { alert("Geolocation not supported"); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        reverseGeocodeLocation(coords);
      },
      err => { alert("Unable to retrieve location"); }
    );
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    localStorage.removeItem("deliveryCoords");
    localStorage.removeItem("deliveryAddress");
    updateMap(DEFAULT_POS, "");
    document.getElementById("locationInput").value = "";
    document.getElementById("coordinates").innerText = "No location selected.";
    document.getElementById("user_id_location").value = "";
    document.getElementById("connectionLink").innerText = "";
    stopLiveTracking(); // Optional: stop live updates when reset
  });

  // Initialize live tracking (if user ID exists)
  const userId = document.getElementById("user_id_location").value;
  if (userId) {
    startLiveTracking(userId);
  }
}

// Function to update the map and marker
function updateMap(position, address) {
  map.setCenter(position);
  marker.setPosition(position);
  // Optionally, update address display
  document.getElementById("coordinates").innerText = `Lat: ${position.lat}, Lng: ${position.lng}`;
}

// Save location to localStorage
function saveLocation(position, address) {
  localStorage.setItem("deliveryCoords", JSON.stringify(position));
  localStorage.setItem("deliveryAddress", address);
}

// Generate a user ID (placeholder function)
function generateUserId() {
  return 'user_' + Math.random().toString(36).substr(2, 9);
}

// Geocode address
function geocodeAddress(address) {
  geocoder.geocode({ address }, (results, status) => {
    if (status !== "OK" || !results[0]) { alert("Location not found."); return; }
    const loc = {
      lat: results[0].geometry.location.lat(),
      lng: results[0].geometry.location.lng()
    };
    const userId = generateUserId();
    saveLocation(loc, results[0].formatted_address);
    updateMap(loc, results[0].formatted_address);
    document.getElementById("user_id_location").value = userId;
    const liveUrl = `https://yourdomain.com/connection/${userId}`;
    document.getElementById("connectionLink").innerText = liveUrl;
    startLiveTracking(userId); // Start live tracking for this user
    alert("Location set and saved!");
  });
}

// Reverse geocode location
function reverseGeocodeLocation(pos) {
  geocoder.geocode({ location: pos }, (results, status) => {
    if (status !== "OK" || !results[0]) { alert("Unable to get address"); return; }
    const address = results[0].formatted_address;
    const userId = generateUserId();
    saveLocation(pos, address);
    updateMap(pos, address);
    document.getElementById("user_id_location").value = userId;
    const liveUrl = `https://yourdomain.com/connection/${userId}`;
    document.getElementById("connectionLink").innerText = liveUrl;
    startLiveTracking(userId); // Start live tracking for this user
  });
}

// --- Live tracking functions ---

let liveTrackingSocket; // WebSocket connection

function startLiveTracking(userId) {
  // Replace with your actual WebSocket URL
  const socketUrl = `wss://yourdomain.com/live-tracking/${userId}`;
  if (liveTrackingSocket) {
    liveTrackingSocket.close();
  }
  liveTrackingSocket = new WebSocket(socketUrl);

  liveTrackingSocket.onopen = () => {
    console.log("Live tracking socket connected");
  };

  liveTrackingSocket.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.lat && data.lng) {
      // Update marker position
      const newPos = { lat: data.lat, lng: data.lng };
      marker.setPosition(newPos);
      map.setCenter(newPos);
    }
  };

  liveTrackingSocket.onerror = (err) => {
    console.error("WebSocket error:", err);
  };

  liveTrackingSocket.onclose = () => {
    console.log("Live tracking socket closed");
  };
}

function stopLiveTracking() {
  if (liveTrackingSocket) {
    liveTrackingSocket.close();
    liveTrackingSocket = null;
  }
}

function updateMap(pos, address) {
  map.setCenter(pos);
  map.setZoom(15);
  marker.setPosition(pos);
  document.getElementById("coordinates").innerText = `Lat: ${pos.lat.toFixed(5)}, Lng: ${pos.lng.toFixed(5)}`;
  if (address) document.getElementById("locationInput").value = address;
}

function saveLocation(pos, address) {
  localStorage.setItem("deliveryCoords", JSON.stringify(pos));
  localStorage.setItem("deliveryAddress", address);
}

// Generate a unique user ID (simple example)
function generateUserId() {
  return 'user_' + Math.random().toString(36).substr(2, 9);
}

// Load previous location if saved
function loadSavedLocation() {
  const saved = localStorage.getItem("savedLocation");
  if (saved) {
    const data = JSON.parse(saved);
    if (data && data.position) {
      updateMap(data.position, data.address);
    }
  }
}
</script>
</body>
</html>
