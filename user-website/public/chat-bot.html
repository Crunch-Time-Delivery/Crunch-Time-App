<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Chat App - Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f2f5;
}
.top-bar {
  background: #ef0606;
  color: #fff;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar button {
  background: #fff;
  color: #ed0808;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 12px;
  margin-left: 5px;
}
.chat-container {
  max-width: 500px;
  margin: 20px auto;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  height: 80vh;
}
.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.msg {
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 80%;
  font-size: 14px;
  position: relative;
  line-height: 1.4;
}
.msg .time {
  font-size: 10px;
  display: block;
  margin-top: 5px;
  opacity: 0.7;
}
.user {
  background: #f20909;
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 2px;
}
.bot {
  background: #f1f3f4;
  color: #333;
  margin-right: auto;
  border-bottom-left-radius: 2px;
}
.input-box {
  display: flex;
  padding: 10px;
  border-top: 1px solid #eee;
}
.input-box input {
  flex: 1;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 25px;
  outline: none;
  padding-left: 20px;
}
.input-box button {
  background: #f40404;
  color: #fff;
  border: none;
  padding: 0 20px;
  margin-left: 10px;
  border-radius: 25px;
  cursor: pointer;
}
.input-box button:disabled {
  background: #ccc;
}

/* Sign-in Modal Styles */
#signInModal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#signInModalContent {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  max-width: 400px;
  width: 80%;
  text-align: center;
}
</style>
</head>
<body>

<div class="top-bar" id="topBar">
  <div>AI Chat Bot 🤖</div>
</div>

<!-- Sign-in Modal -->
<div id="signInModal">
  <div id="signInModalContent">
    <h2>Please Sign In</h2>
    <div id="modalSignInButton"></div>
    <button style="margin-top:20px; padding:10px 20px; border:none; border-radius:5px; background:#ef0606; color:#fff; cursor:pointer;" onclick="closeSignInModal()">Close</button>
  </div>
</div>

<div class="chat-container">
  <div class="messages" id="messages"></div>
  <div class="input-box">
    <input id="messageInput" disabled placeholder="Please log in…" onkeypress="handleKeyPress(event)" />
    <button id="sendBtn" disabled onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const CLIENT_ID = '866867707128-mq963ediu3mijf16r27c8e1fgnmp2h3f';

let currentUser = null; // Store user info

window.onload = () => {
  // Initialize Google Sign-In for main button
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleGoogleSignIn
  });
  google.accounts.id.renderButton(
    document.getElementById("topBar"),
    { theme: "outline", size: "medium" }
  );

  // Load chat history
  loadChatHistory();

  // Check if user is logged in (simulate)
  if (!currentUser) {
    disableInput();
  }
};

// Function to show login modal
function showSignInModal() {
  document.getElementById('signInModal').style.display = 'flex';
  // Render Google Sign-In button in modal
  google.accounts.id.renderButton(
    document.getElementById('modalSignInButton'),
    { theme: "outline", size: "medium" }
  );
}

// Close modal
function closeSignInModal() {
  document.getElementById('signInModal').style.display = 'none';
}

// Handle Google Sign-In callback
function handleGoogleSignIn(response) {
  const payload = parseJwt(response.credential);
  currentUser = {
    name: payload.name,
    avatar: payload.picture
  };
  updateUIAfterLogin();
  addMessage("Logged in! How can I help you today?", "bot", false);
  closeSignInModal();
}

// Parse JWT token
function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
}

// Update UI after login
function updateUIAfterLogin() {
  document.getElementById("topBar").innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <img src="${currentUser.avatar}" style="width:30px;height:30px;border-radius:50%">
      <span>Hi, ${currentUser.name.split(' ')[0]}</span>
    </div>
    <div style="margin-top:10px; display:flex; gap:10px;">
      <button onclick="logout()">Logout</button>
      <button onclick="clearChat()">Clear Chat</button>
    </div>
  `;
  enableInput();
}

// Enable message input
function enableInput() {
  document.getElementById("messageInput").disabled = false;
  document.getElementById("messageInput").placeholder = "Type a message...";
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("messageInput").focus();
}

// Disable message input
function disableInput() {
  document.getElementById("messageInput").disabled = true;
  document.getElementById("messageInput").placeholder = "Please log in…";
  document.getElementById("sendBtn").disabled = true;
}

// Handle key press
function handleKeyPress(e) {
  if (e.key === "Enter") sendMessage();
}

// Send message
async function sendMessage() {
  if (!currentUser) {
    showSignInModal();
    return;
  }
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typingId = "typing-" + Date.now();
  addMessage("DeepAI is thinking...", "bot", false, typingId);

  const reply = await generateDeepAiResponse(text);
  document.getElementById(typingId).remove();
  addMessage(reply, "bot");
}

// Generate response from DeepAI API
async function generateDeepAiResponse(message) {
  const apiKey = 'quickstart-QUdJIGlzIGNvbWJlZC4'; // Replace with your API key
  const url = 'https://api.deepai.org/api/text-generator';

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Api-Key': apiKey,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ text: message }),
    });

    const data = await response.json();

    if (data && data.output) {
      return data.output;
    } else {
      throw new Error('Invalid response from DeepAI API');
    }
  } catch (error) {
    console.error('Error:', error);
    return 'Sorry, I encountered an error.';
  }
}

// Add message to chat
function addMessage(text, type, save=true, id=null) {
  const messagesDiv = document.getElementById("messages");
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  if (id) div.id = id;
  div.innerHTML = `${text} <span class="time">${time}</span>`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  if (save) {
    saveMessageToHistory({ text, type, time });
  }
  return div;
}

// Save to local storage
function saveMessageToHistory(message) {
  let history = JSON.parse(localStorage.getItem('messageHistory')) || [];
  history.push(message);
  localStorage.setItem('messageHistory', JSON.stringify(history));
}

// Load chat history
function loadChatHistory() {
  const history = JSON.parse(localStorage.getItem('messageHistory')) || [];
  history.forEach(msg => {
    addMessage(msg.text, msg.type, false);
  });
}

// Clear chat
function clearChat() {
  if(confirm("Clear all messages?")) {
    document.getElementById("messages").innerHTML = "";
    localStorage.removeItem('messageHistory');
  }
}

// Logout user
function logout() {
  currentUser = null;
  document.getElementById("topBar").innerHTML = `<div>AI Chat Bot 🤖</div>`;
  disableInput();
  localStorage.removeItem('messageHistory');
}

// For demonstration, show sign-in modal when clicking "Sign In" button
// (You can add a dedicated button if needed)
</script>

</body>
</html>
