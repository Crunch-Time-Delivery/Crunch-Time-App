<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Delivery Location</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .search-location-container {
      max-width: 600px;
      margin: 0 auto;
    }
    /* Flex container for title and red column */
    .title-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    /* Title styling */
    h1 {
      margin: 0;
      font-size: 24px;
      flex: 1;
    }
    /* Red column styling */
    .red-column {
      width: 20px;
      height: 20px;
      background-color: red;
      margin-left: 10px;
      border-radius: 3px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    #map {
      height: 400px;
      width: 100%;
      margin-top: 20px;
    }
    .buttons-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      justify-content: center;
    }
    #coordinates {
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="search-location-container">
  <div class="title-row">
    <h1>Search Delivery Location</h1>
    <div class="red-column"></div>
  </div>

  <!-- ADDRESS SEARCH -->
  <form id="locationForm">
    <input type="text" id="locationInput" placeholder="Enter address or city" required>
    <!-- Hidden input to store location data -->
    <input type="hidden" id="user_location_id" name="user_location_id" />
    <button type="submit" id="setLocationBtn">Set Location</button>
  </form>

  <!-- ACTION BUTTONS (Use My Location and Reset) -->
  <div class="buttons-group">
    <button type="button" id="locateBtn">Use My Location</button>
    <button type="button" id="resetBtn">Reset Map</button>
  </div>

  <!-- MAP -->
  <div id="map"></div>
  <div id="coordinates">No location selected.</div>
</div>

<!-- Google Maps API with callback -->
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9sNhi824hNncjfW7HHzaI_s8JtWGfM0Q&callback=initMap"
></script>

<script>
let map, marker, geocoder;
const DEFAULT_POS = { lat: -33.9249, lng: 18.4241 }; // Cape Town

function initMap() {
  // Initialize the map centered at DEFAULT_POS
  map = new google.maps.Map(document.getElementById("map"), {
    center: DEFAULT_POS,
    zoom: 13
  });

  // Initialize a draggable marker
  marker = new google.maps.Marker({
    map: map,
    position: DEFAULT_POS,
    draggable: true
  });

  // Initialize geocoder
  geocoder = new google.maps.Geocoder();

  // Load saved location if available
  loadSavedLocation();

  // Handle form submission for address search
  document.getElementById("locationForm").addEventListener("submit", e => {
    e.preventDefault();
    const address = document.getElementById("locationInput").value.trim();
    if (!address) {
      alert("Please enter an address.");
      return;
    }
    geocodeAddress(address);
  });

  // Handle "Use current location" button
  document.getElementById("locateBtn").addEventListener("click", () => {
    if (!navigator.geolocation) {
      alert("Geolocation is not supported by your browser.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      position => {
        const pos = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        reverseGeocodeLocation(pos);
      },
      error => {
        alert("Unable to retrieve your location. Please check permissions.");
        console.error(error);
      }
    );
  });
}

// Geocode an address and update map
function geocodeAddress(address) {
  geocoder.geocode({ address }, (results, status) => {
    if (status !== "OK" || !results[0]) {
      alert("Location not found. Please check the address.");
      return;
    }
    const result = results[0];
    const pos = {
      lat: result.geometry.location.lat(),
      lng: result.geometry.location.lng()
    };
    saveLocation(pos, result.formatted_address);
    updateMap(pos, result.formatted_address);
    document.getElementById("user_location_id").value = `${pos.lat},${pos.lng}`;
    alert("Location set and saved!");
  });
}

// Reverse geocode a location to get address
function reverseGeocodeLocation(pos) {
  geocoder.geocode({ location: pos }, (results, status) => {
    if (status !== "OK" || !results[0]) {
      alert("Unable to get address for your location");
      return;
    }
    const address = results[0].formatted_address;
    saveLocation(pos, address);
    updateMap(pos, address);
    document.getElementById("user_location_id").value = `${pos.lat},${pos.lng}`;
  });
}

// Update the map marker and center
function updateMap(pos, address) {
  marker.setPosition(pos);
  map.setCenter(pos);
  // Optionally, update marker info window or other UI elements
  // e.g., marker.setTitle(address);
}

// Save location data (implement as needed)
function saveLocation(pos, address) {
  // Save to localStorage or your backend
  localStorage.setItem("savedLocation", JSON.stringify({ position: pos, address: address }));
}

// Load saved location (if any)
function loadSavedLocation() {
  const saved = localStorage.getItem("savedLocation");
  if (saved) {
    const data = JSON.parse(saved);
    if (data && data.position) {
      updateMap(data.position, data.address);
      document.getElementById("locationInput").value = data.address || "";
      document.getElementById("user_location_id").value = `${data.position.lat},${data.position.lng}`;
    }
  } const coordsStr = localStorage.getItem("deliveryCoords");
  const address = localStorage.getItem("deliveryAddress");
  if (coordsStr && address) {
    const coords = JSON.parse(coordsStr);
    updateMap(coords, address);
  }
}

  // Reset map button inside initMap
  document.getElementById("resetBtn").addEventListener("click", () => {
    localStorage.removeItem("deliveryCoords");
    localStorage.removeItem("deliveryAddress");
    updateMap(DEFAULT_POS, "");
    document.getElementById("locationInput").value = "";
    document.getElementById("coordinates").innerText = "No location selected.";
    document.getElementById("user_location_id").value = "";
  });




// Update map and marker
function updateMap(pos, address) {
  map.setCenter(pos);
  map.setZoom(15);
  marker.setPosition(pos);
  document.getElementById("coordinates").innerText =
    `Lat: ${pos.lat.toFixed(5)}, Lng: ${pos.lng.toFixed(5)}`;
  if (address) document.getElementById("locationInput").value = address;
}

// Save location to local storage
function saveLocation(pos, address) {
  localStorage.setItem("deliveryCoords", JSON.stringify(pos));
  localStorage.setItem("deliveryAddress", address);
}
</script>
</body>
</html>
