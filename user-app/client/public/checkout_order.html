<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Checkout Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
/* Your existing styles plus new styles for top pin message */

* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
.app { width: 100vw; min-height: 100vh; display: flex; flex-direction: column; }

.header { padding: 14px; display: flex; align-items: center; border-bottom: 1px solid #ddd; background: white; }
.header i { font-size: 18px; cursor: pointer; }
.header h2 { margin: auto; font-size: clamp(16px, 2.5vw, 20px); }

.status { text-align: center; padding: 10px; font-size: clamp(12px, 2.5vw, 14px); background: #fff; font-weight: bold; }

.map { flex: 1; }

.driver-panel { background: white; border-radius: 25px 25px 0 0; padding: 14px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
.driver-row { display: flex; align-items: center; gap: 10px; }
.driver-avatar { width: 12vw; height: 12vw; max-width: 60px; max-height: 60px; min-width: 45px; min-height: 45px; border-radius: 50%; background: #ff3d3d; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(18px, 4vw, 28px); }
.actions { margin-left: auto; display: flex; gap: 10px; }
.action-btn { width: 10vw; height: 10vw; max-width: 42px; max-height: 42px; min-width: 34px; min-height: 34px; background: #ff3d3d; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: clamp(14px, 3vw, 18px); cursor: pointer; }
.info { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.badge { background: red; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: clamp(11px, 2.5vw, 13px); }
.rating { background: #ffe600; padding: 4px 10px; border-radius: 8px; font-size: clamp(11px, 2.5vw, 13px); font-weight: bold; }
.time { font-size: clamp(20px, 5vw, 28px); font-weight: bold; }
.tabs { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
.tabs div { font-weight: bold; font-size: clamp(13px, 3vw, 15px); color: #444; cursor: pointer; }
.tabs .active { color: red; }
.panel { display: none; margin-top: 10px; font-size: clamp(12px, 3vw, 14px); }
.panel.active { display: block; }

/* Styles for top pin message */
#topPinMessage {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff3cd;
  border: 1px solid #ffeeba;
  padding: 15px;
  border-radius: 10px;
  max-width: 600px;
  width: 90%;
  cursor: default;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  z-index: 10000;
}
#topPinMessage h3 {
  margin: 0;
  font-size: 16px;
}
#topPinMessage span {
  font-weight: bold;
}
#topPinMessage button {
  position: absolute;
  top: 5px;
  right: 10px;
  background: none;
  border: none;
  font-size: 1.2em;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- The top pin message -->
<div id="topPinMessage">
  <h3>Order PIN: <span id="orderPin">Loading...</span></h3>
</div>

<!-- Main app content -->
<div class="app">
    <div class="header">
        <i class="fa fa-arrow-left" onclick="goBack()"></i>
        <h2 id="restaurantName">KFC</h2>
    </div>
    <div class="status">
        The courier is on their way to you
    </div>
    <!-- Map container -->
    <div class="map" id="map" style="height: 50vh; width: 100%;"></div>
    <div class="driver-panel">
        <div class="driver-row">
            <div class="driver-avatar">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <div>
                <strong id="loadDriverName">Your Driver</strong><br>
                <small>On the way</small>
            </div>
            <div class="actions">
                <div class="action-btn" onclick="callDriver()"><i class="fa fa-phone"></i></div>
                <div class="action-btn" onclick="chatDriver()"><i class="fa fa-comment"></i></div>
            </div>
        </div>
        <!-- Order info section -->
        <div class="info" id="orderInfoSection">
            <div>
                <div class="badge" id="driverPlateNo">CAA5567</div>
                <div class="rating">4.8 ⭐</div>
            </div>
            <div style="text-align:right;">
                <div class="time" id="deliveryTime">12:56</div>
                <small>Estimated time to delivery</small>
            </div>
        </div>
        <!-- Tabs -->
        <div class="tabs">
            <div id="tabProgress" class="active" onclick="showTab('progress')">Order Progress</div>
            <div id="tabInfo" onclick="showTab('info')">Order Info</div>
        </div>
        <div id="progress" class="panel active">
            <p>✔ Order confirmed</p>
            <p>✔ Restaurant preparing food</p>
            <p>🚴 Driver on the way</p>
        </div>
        <div id="info" class="panel">
            <p><strong>Order:</strong> #CAA5567 </p>
            <p><strong>Restaurant:</strong> KFC Parow </p>
            <p><strong>Status:</strong> Out for delivery </p>
        </div>
    </div>
</div>

<!-- Notification container -->
<div id="notification" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; display:none; z-index:9999;"></div>

<!-- Load Google Maps API with your API key -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9sNhi824hNncjfW7HHzaI_s8JtWGfM0Q&callback=initMap"></script>

<script>
// Function to display notification messages
function showNotificationMessage(text, color = '#333') {
  let box = document.getElementById('notificationMessage');

  if (!box) {
    box = document.createElement('div');
    box.id = 'notificationMessage';
    box.style.position = 'fixed';
    box.style.bottom = '20px';
    box.style.left = '50%';
    box.style.transform = 'translateX(-50%)';
    box.style.padding = '12px 20px';
    box.style.borderRadius = '8px';
    box.style.color = '#fff';
    box.style.fontSize = '14px';
    box.style.zIndex = '9999';
    document.body.appendChild(box);
  }

  box.style.backgroundColor = color;
  box.innerText = text;

  // Remove the notification after 4 seconds
  setTimeout(() => box.remove(), 4000);
}

// Function to send Twilio notification
function sendTwilioNotification(phoneNumber, message, callback = null) {
  if (!phoneNumber || !message) {
    showNotificationMessage('Phone number or message missing', '#f44336');
    return;
  }
  
  showNotificationMessage('Sending notification...', '#2196F3');

  fetch('/send-twilio', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ phoneNumber, message })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      showNotificationMessage('Notification sent successfully!', '#4CAF50');
      if (callback && typeof callback === 'function') callback(true, data);
    } else {
      showNotificationMessage('Failed to send notification.', '#f44336');
      if (callback && typeof callback === 'function') callback(false, data);
    }
  })
  .catch(() => {
    showNotificationMessage('Error sending notification.', '#f44336');
    if (callback && typeof callback === 'function') callback(false);
  });
}

// Function to handle checkout order
function checkout_order(orderId, driverPhoneNumber) {
  const message = `Order #${orderId} has been checked out. Please proceed accordingly.`;
  notifyDriver(driverPhoneNumber, message);
}

// Function to notify driver via Twilio SMS
function notifyDriver(phoneNumber, message) {
  showNotificationMessage(`Notifying driver at ${phoneNumber}...`, '#2196F3');

  sendTwilioNotification(phoneNumber, message, (success, data) => {
    if (success) {
      showNotificationMessage(`Driver notified successfully!`, '#4CAF50');
    } else {
      showNotificationMessage(`Failed to notify driver.`, '#f44336');
    }
  });
}

let map;
let driverMarker;
const driverId = "123"; // Your driver ID
let trackingInterval;

// Function to generate a random 6-digit PIN
function generatePIN() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function initMap() {
  const defaultLocation = { lat: -33.9249, lng: 18.4241 }; // Example: Cape Town
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: defaultLocation,
  });
  trackDriver();
}

function startTracking() {
  fetchAndUpdateLocation(); // Initial fetch
  // Set interval for periodic updates
  trackingInterval = setInterval(fetchAndUpdateLocation, 10000);
}

function stopTracking() {
  clearInterval(trackingInterval);
}

function fetchAndUpdateLocation() {
  fetch(`/api/driver-location?driverId=${driverId}`)
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(data => {
      const loc = { lat: data.latitude, lng: data.longitude };
      if (!driverMarker) {
        driverMarker = new google.maps.Marker({ position: loc, map: map, title: "Driver's Location" });
      } else {
        driverMarker.setPosition(loc);
      }
      map.setCenter(loc);
    })
    .catch(error => {
      console.error('Error fetching driver location:', error);
    });
}

// Optional: Use browser geolocation for real-time tracking
function startBrowserGeolocation() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      position => {
        const loc = { lat: position.coords.latitude, lng: position.coords.longitude };
        if (!driverMarker) {
          driverMarker = new google.maps.Marker({ position: loc, map: map, title: "Driver's Location" });
        } else {
          driverMarker.setPosition(loc);
        }
        map.setCenter(loc);
      },
      error => {
        console.error('Geolocation error:', error);
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
    );
  } else {
    console.error('Geolocation is not supported by this browser.');
  }
}

async function fetchRestaurantName() {
  const res = await fetch('/api/restaurant-name');
  const data = await res.json();
  document.getElementById('restaurantName').innerText = data.name || 'Your Restaurant';
}

function goBack() { window.history.back(); }
function callDriver() { window.location.href = "tel:+27781234567"; }
function chatDriver() { window.open("https://wa.me/27781234567", "_blank"); }

function showTab(tab) {
  document.getElementById("progress").classList.remove("active");
  document.getElementById("info").classList.remove("active");
  document.getElementById("tabProgress").classList.remove("active");
  document.getElementById("tabInfo").classList.remove("active");
  document.getElementById(tab).classList.add("active");
  document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
}

// Show the top pin message (initially hidden)
function showPinMessage() {
  document.getElementById('topPinMessage').style.display = 'block';
}

// Generate and display the PIN
window.onload = () => {
  fetchRestaurantName();
  const pin = generatePIN();
  document.getElementById('orderPin').innerText = pin;
  showPinMessage(); // Show pin message at top
};
</script>
</body>
</html>
