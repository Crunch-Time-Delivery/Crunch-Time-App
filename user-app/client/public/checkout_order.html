<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Checkout Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
/* Styles for the page and top pin message */
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
.app { width: 100vw; min-height: 100vh; display: flex; flex-direction: column; }

.header { padding: 14px; display: flex; align-items: center; border-bottom: 1px solid #ddd; background: white; }
.header i { font-size: 18px; cursor: pointer; }
.header h2 { margin: auto; font-size: clamp(16px, 2.5vw, 20px); }

.status { text-align: center; padding: 10px; font-size: clamp(12px, 2.5vw, 14px); background: #fff; font-weight: bold; }

.map { flex: 1; }

.driver-panel { background: white; border-radius: 25px 25px 0 0; padding: 14px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
.driver-row { display: flex; align-items: center; gap: 10px; }
.driver-avatar { width: 12vw; height: 12vw; max-width: 60px; max-height: 60px; min-width: 45px; min-height: 45px; border-radius: 50%; background: #ff3d3d; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(18px, 4vw, 28px); }
.actions { margin-left: auto; display: flex; gap: 10px; }
.action-btn { width: 10vw; height: 10vw; max-width: 42px; max-height: 42px; min-width: 34px; min-height: 34px; background: #ff3d3d; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: clamp(14px, 3vw, 18px); cursor: pointer; }
.info { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.badge { background: red; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: clamp(11px, 2.5vw, 13px); }
.rating { background: #ffe600; padding: 4px 10px; border-radius: 8px; font-size: clamp(11px, 2.5vw, 13px); font-weight: bold; }
.time { font-size: clamp(20px, 5vw, 28px); font-weight: bold; }
.tabs { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
.tabs div { font-weight: bold; font-size: clamp(13px, 3vw, 15px); color: #444; cursor: pointer; }
.tabs .active { color: red; }
.panel { display: none; margin-top: 10px; font-size: clamp(12px, 3vw, 14px); }
.panel.active { display: block; }

/* Styles for top pin message */
#topPinMessage {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff3cd;
  border: 1px solid #ffeeba;
  padding: 15px;
  border-radius: 10px;
  max-width: 600px;
  width: 90%;
  cursor: default;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
#topPinMessage h3 {
  margin: 0;
  font-size: 16px;
}
#topPinMessage span {
  font-weight: bold;
}
#topPinMessage button {
  position: absolute;
  top: 5px;
  right: 10px;
  background: none;
  border: none;
  font-size: 1.2em;
  cursor: pointer;
}

/* Custom CSS for driver label overlay */
#driverLabelOverlay {
  position: absolute;
  background: rgba(255, 255, 255, 0.8);
  padding: 4px 8px;
  border-radius: 4px;
  font-weight: bold;
  font-size: 14px;
  color: #000;
  border: 1px solid #ccc;
  white-space: nowrap;
  transform: translate(-50%, -100%);
}
</style>
</head>
<body>

<!-- The top pin message -->
<div id="topPinMessage" style="display:none;">
  <h3>Order PIN: <span id="orderPin">Loading...</span></h3>
  <button onclick="hidePinMessage()"><i class="fa fa-times"></i></button>
</div>

<!-- Main app content -->
<div class="app">
    <div class="header">
        <i class="fa fa-arrow-left" onclick="goBack()"></i>
        <h2 id="restaurantName">KFC</h2>
    </div>
    <div class="status">
        The courier is on their way to you
    </div>
    <!-- Map container -->
    <div class="map" id="map" style="height: 50vh; width: 100%; position: relative;"></div>
    <div class="driver-panel">
        <div class="driver-row">
            <div class="driver-avatar">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <div>
                <strong id="loadDriverName">Your Driver</strong><br>
                <small>On the way</small>
            </div>
            <div class="actions">
                <div class="action-btn" onclick="callDriver()"><i class="fa fa-phone"></i></div>
                <div class="action-btn" onclick="chatDriver()"><i class="fa fa-comment"></i></div>
            </div>
        </div>
        <!-- Order info section -->
        <div class="info" id="orderInfoSection">
            <div>
                <div class="badge" id="driverPlateNo">CAA5567</div>
                <div class="rating">4.8 ⭐</div>
            </div>
            <div style="text-align:right;">
                <div class="time" id="deliveryTime">12:56</div>
                <small>Estimated time to delivery</small>
            </div>
        </div>
        <!-- Tabs -->
        <div class="tabs">
            <div id="tabProgress" class="active" onclick="showTab('progress')">Order Progress</div>
            <div id="tabInfo" onclick="showTab('info')">Order Info</div>
        </div>
        <div id="progress" class="panel active">
            <p>✔ Order confirmed</p>
            <p>✔ Restaurant preparing food</p>
            <p>🚴 Driver on the way</p>
        </div>
        <div id="info" class="panel">
            <p><strong>Order:</strong> #CAA5567 </p>
            <p><strong>Restaurant:</strong> KFC Parow </p>
            <p><strong>Status:</strong> Out for delivery </p>
        </div>
    </div>
</div>

<!-- Notification container -->
<div id="notification" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; display:none; z-index:9999;"></div>

<!-- Load Google Maps API -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9sNhi824hNncjfW7HHzaI_s8JtWGfM0Q&callback=initMap"></script>

<script>
// Utility for PIN display
function generatePIN() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}
function showPinMessage(pin) {
  document.getElementById('orderPin').innerText = pin;
  document.getElementById('topPinMessage').style.display = 'block';
}
function hidePinMessage() {
  document.getElementById('topPinMessage').style.display = 'none';
}

// Map initialization
let map, driverMarker, driverLabelOverlay;
function initMap() {
  const defaultLoc = { lat: -33.9249, lng: 18.4241 };
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 12,
    center: defaultLoc,
  });
  // Create the overlay for label
  createDriverLabelOverlay();
}

function createDriverLabelOverlay() {
  const overlayDiv = document.createElement('div');
  overlayDiv.id = 'driverLabelOverlay';
  overlayDiv.innerText = 'Driver';
  overlayDiv.style.display = 'none'; // hidden initially
  document.getElementById('map').appendChild(overlayDiv);
}

// Main onload
window.onload = () => {
  const orderId = 'ORDER-' + Date.now();
  const orderPin = generatePIN();
  showPinMessage(orderPin);
  console.log('Order ID:', orderId);
  console.log('Order PIN:', orderPin);
  console.log('Live connection URL:', `https://yourdomain.com/connection/${orderId}`);

  // Get driverId from URL param
  const params = new URLSearchParams(window.location.search);
  const driverId = params.get('driverId');

  // Initialize map
  initMap();

  // Start tracking driver if driverId exists
  if (driverId) {
    startTrackingDriver(driverId);
  }
};

// Function to track driver
function startTrackingDriver(driverId) {
  fetchAndUpdateDriverLocation(driverId); // initial
  window.driverTrackingInterval = setInterval(() => {
    fetchAndUpdateDriverLocation(driverId);
  }, 10000); // every 10 sec
}

function fetchAndUpdateDriverLocation(driverId) {
  fetch(`/api/driver-location?driverId=${driverId}`)
    .then(res => res.json())
    .then(data => {
      if (data.lat && data.lng) {
        const pos = { lat: data.lat, lng: data.lng };
        if (!driverMarker) {
          driverMarker = new google.maps.Marker({
            position: pos,
            map: map,
            icon: {
              url: 'https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png',
              scaledSize: new google.maps.Size(40, 40),
            },
            title: 'Driver Location'
          });
        } else {
          driverMarker.setPosition(pos);
        }
        // Move the overlay label
        moveDriverLabel(pos);
        // Center map on driver
        map.setCenter(pos);
      }
    })
    .catch(err => console.error('Error fetching driver location:', err));
}

function moveDriverLabel(position) {
  const overlayDiv = document.getElementById('driverLabelOverlay');
  if (!overlayDiv) return;
  // Convert latlng to pixel position
  const point = new google.maps.Point(0, 0);
  const scale = Math.pow(2, map.getZoom());
  const projection = map.getProjection();
  if (!projection) return;

  const latLngPoint = new google.maps.LatLng(position.lat, position.lng);
  const pixel = projection.fromLatLngToPoint(latLngPoint);
  const pixelX = pixel.x * scale;
  const pixelY = pixel.y * scale;

  // Set CSS position of overlay
  const mapDiv = document.getElementById('map');
  const rect = mapDiv.getBoundingClientRect();

  // Position relative to map container
  overlayDiv.style.left = `${pixelX - rect.left}px`;
  overlayDiv.style.top = `${pixelY - rect.top}px`;
  overlayDiv.style.display = 'block';
}
</script>
</body>
</html>
