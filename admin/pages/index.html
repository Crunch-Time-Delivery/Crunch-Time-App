<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>React Dashboard</title>
  <!-- React + ReactDOM + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding-top:71px;
    }
    /* Your CSS from static HTML */
    .top-header {
      width: 100%;
      background: #fff;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 24px;
      color: red;
      text-align: center;
      border-bottom: 1px solid #ccc;
    }
    .header {
      display:flex; justify-content:space-between; align-items:center;
      background:red; padding:10px 20px; color:#fff; position:fixed; top:0; width:100%; height:60px; z-index:1000; border-bottom:1px solid #ccc;
    }
    .menu-container {
      position:relative;
    }
    #menuDropdown {
      display:none;
      position:absolute; top:100%; left:0; background:#fff; border:1px solid #ccc; padding:5px; box-shadow:0 2px 8px rgba(0,0,0,0.2);
      z-index: 1001; width:200px;
    }
    #menuDropdown.show { display: block; }
    #menuDropdown button {
      display:block; width:100%; padding:8px; border:none; background:none; cursor:pointer; text-align:left;
    }
    .profile-section {
      display:flex; align-items:center; cursor:pointer; margin-left:auto;
    }
    #profileImage {
      border-radius:50%; width:40px; height:40px; object-fit:cover;
    }
    .admin-name {
      margin-left:10px;
    }
    .section { display:none; padding-top:70px; }
    .section.active { display:block; }
    button {
      padding:8px 12px; border:none; border-radius:4px; cursor:pointer; margin:5px;
    }
    .btn-primary { background:#4CAF50; color:#fff; }
    .btn-primary:hover { background:#45a049; }
    .modal {
      display: flex; align-items: center; justify-content: center;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index:9999;
    }
    .modal-box {
      background:#fff; padding:30px; border-radius:8px; width:400px; max-height:80%; overflow-y:auto;
    }
    h2 { margin-bottom:10px; }
    #filterDropdown {
      display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #ccc; padding: 10px; z-index: 1002; width: 200px;
    }
    #filterDropdown.show { display: block; }
    #filterDropdown button {
      display: block; width: 100%; padding: 8px; border: none; background: none; cursor:pointer; text-align: left;
    }
    .chart-container {
      display: flex; flex-direction: column; align-items: center; margin-top: 20px;
    }
    canvas {
      max-width: 400px; margin: 20px 0;
    }
    .role-buttons {
      display: flex; gap: 10px;
    }
    .percentage-change {
      font-size: 14px; margin-left: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- Modal components ---
    function LoginModal({ onClose, onLogin }) {
      return (
        <div className="modal">
          <div className="modal-box">
            <div style={{ maxWidth: 300, padding:20, textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center' }}>
              <img src="Screenshot (254).jpg" alt="Welcome" style={{ width:250, marginBottom:20 }} />
              <h2 style={{ color:'gray' }}>Welcome</h2>
              <h3>Admin Login</h3>
              <label>Username</label>
              <input id="username" placeholder="Username" style={{ width:'100%', marginBottom:10, padding:8 }} />
              <label>Password</label>
              <input id="password" type="password" placeholder="Password" style={{ width:'100%', marginBottom:10, padding:8 }} />
              <button style={{ width:'100%', backgroundColor:'red' }} onClick={onLogin}>Login</button>
            </div>
          </div>
        </div>
      );
    }

    function AdminPopup({ onClose, onSave }) {
      return (
        <div className="modal">
          <div className="modal-box" style={{ width:400, overflowY:'auto' }}>
            <img src="Screenshot (254).jpg" alt="Welcome" style={{ width:250, marginBottom:20 }} />
            <h3>Admin Update</h3>
            <div>
              <label>Change Username:</label>
              <input id="newUsername" style={{ width:'100%', marginBottom:10 }} />
            </div>
            <div>
              <label>Change Password:</label>
              <input id="newPassword" type="password" style={{ width:'100%', marginBottom:10 }} />
            </div>
            <button onClick={onSave}>Save Credentials</button>
            <hr style={{ margin:'10px 0' }} />
            <h4>Add New Admin</h4>
            <div>
              <label>Email:</label>
              <input id="newAdminEmail" style={{ width:'100%', marginBottom:10 }} />
            </div>
            <div>
              <label>Username:</label>
              <input id="newAdminUsername" style={{ width:'100%', marginBottom:10 }} />
            </div>
            <div>
              <label>Password:</label>
              <input id="newAdminPassword" type="password" style={{ width:'100%', marginBottom:10 }} />
            </div>
            <button onClick={onClose}>Add Admin</button>
            <button style={{ marginTop:10, background:'red', color:'#fff', width:'100%' }} onClick={onClose}>Close</button>
          </div>
        </div>
      );
    }

    function RolePopup({ onClose }) {
      return (
        <div className="modal" style={{ display:'flex', flexDirection:'column' }}>
          <div className="modal-box" style={{ width:'90%', maxHeight:'90%', overflowY:'auto' }}>
            <h3>Role Management</h3>
            {/* User Accounts Table */}
            <h4>User Accounts</h4>
            <table style={{ width:'100%', borderCollapse:'collapse' }} border={1}>
              <thead><tr><th>Email</th><th>Actions</th></tr></thead>
              <tbody>
                <tr>
                  <td>user1@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View User 1")}>View</button>
                    <button onClick={() => alert("Delete User 1")}>Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>user2@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View User 2")}>View</button>
                    <button onClick={() => alert("Delete User 2")}>Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
            {/* Vendor Accounts Table */}
            <h4>Vendor Accounts</h4>
            <table style={{ width:'100%', borderCollapse:'collapse' }} border={1}>
              <thead><tr><th>Email</th><th>Actions</th></tr></thead>
              <tbody>
                <tr>
                  <td>vendor1@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View Vendor 1")}>View</button>
                    <button onClick={() => alert("Delete Vendor 1")}>Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>vendor2@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View Vendor 2")}>View</button>
                    <button onClick={() => alert("Delete Vendor 2")}>Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
            {/* Driver Accounts Table */}
            <h4>Driver Accounts</h4>
            <table style={{ width:'100%', borderCollapse:'collapse' }} border={1}>
              <thead><tr><th>Email</th><th>Actions</th></tr></thead>
              <tbody>
                <tr>
                  <td>driver1@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View Driver 1")}>View</button>
                    <button onClick={() => alert("Delete Driver 1")}>Delete</button>
                  </td>
                </tr>
                <tr>
                  <td>driver2@gmail.com</td>
                  <td className="role-buttons">
                    <button onClick={() => alert("View Driver 2")}>View</button>
                    <button onClick={() => alert("Delete Driver 2")}>Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
            {/* Close button */}
            <button style={{ marginTop:15, background:'red', color:'#fff', width:'100%', padding:10, border:'none', borderRadius:6 }} onClick={onClose}>Close</button>
          </div>
        </div>
      );
    }

    function RoleInfoPopup({ role, onClose }) {
      return (
        <div className="modal" style={{ display:'flex' }}>
          <div className="modal-box" style={{ width:'90%', maxHeight:'90%', overflowY:'auto' }}>
            <h3>Role Information</h3>
            <div style={{ marginBottom:20 }}>
              <h4>{role.roleType} Role Details</h4>
              <p>Email: {role.email}</p>
              <p>Role: {role.roleType}</p>
              <p>Status: Active</p>
            </div>
            <button style={{ marginTop:10, background:'rgb(255,0,0)', color:'#fff', width:'100%', padding:10, border:'none', borderRadius:6 }} onClick={() => alert('Send notification')}>Send Email/Notification</button>
            <button style={{ marginTop:10, background:'red', color:'#fff', width:'100%', padding:10, border:'none', borderRadius:6 }} onClick={onClose}>Close</button>
          </div>
        </div>
      );
    }

    // --- Main App ---
    function App() {
      const [showLogin, setShowLogin] = useState(true);
      const [showAdminPopup, setShowAdminPopup] = useState(false);
      const [showRolePopup, setShowRolePopup] = useState(false);
      const [showRoleInfoPopup, setShowRoleInfoPopup] = useState(false);
      const [currentRole, setCurrentRole] = useState({ email: '', roleType: '' });
      const [currentSection, setCurrentSection] = useState('dashboard');
      const [menuOpen, setMenuOpen] = useState(false);
      const [profileImage, setProfileImage] = useState('https://via.placeholder.com/40');
      const [adminName, setAdminName] = useState('Admin');

      // Handlers
      const toggleMenu = () => setMenuOpen(!menuOpen);
      const handleProfileImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = () => setProfileImage(reader.result);
          reader.readAsDataURL(file);
        }
      };
      const handleLogin = () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if (u==='crunchtimeadmin' && p==='crunchtimeadmin') {
          alert('Login successful!');
          setShowLogin(false);
          setAdminName(u);
        } else {
          alert('Invalid credentials');
        }
      };
      const showSection = (section) => {
        setCurrentSection(section);
        if (section==='Vendor') loadVendors();
        if (section==='Driver') loadDrivers();
      };
      const loadVendors = () => alert('Loading Vendors...');
      const loadDrivers = () => alert('Loading Drivers...');
      
      // Render
      return (
        <>
          {/* Top Header */}
          <div className="top-header">CRUNCHTIME</div>
          
          {/* Header */}
          <div className="header">
            {/* Menu Icon */}
            <div className="menu-container" style={{ position:'relative' }}>
              <div style={{ cursor:'pointer', fontSize:24 }} onClick={toggleMenu}>☰</div>
              <div
                id="menuDropdown"
                className={menuOpen ? 'show' : ''}
                style={{
                  display: menuOpen ? 'block' : 'none',
                  position:'absolute', top:'100%', left:0,
                  background:'#fff', border:'1px solid #ccc', padding:5,
                  boxShadow:'0 2px 8px rgba(0,0,0,0.2)', zIndex:1001, width:200
                }}
              >
                <button onClick={() => showSection('dashboard')}>Dashboard</button>
                <button onClick={() => window.location.href='http://127.0.0.1:5501/admin/estabilshment.html'}>Establishment</button>
                <button onClick={() => window.location.href='http://127.0.0.1:5501/admin/restaurant_menu.html'}>Restaurant Menu</button>
                <button onClick={() => showSection('Driver')}>Driver</button>
                <button onClick={() => showSection('Vendor')}>Vendor</button>
              </div>
            </div>
            {/* Profile */}
            <div
              className="profile-section"
              style={{ display:'flex', alignItems:'center', cursor:'pointer', marginLeft:'auto' }}
              onClick={() => document.getElementById('profileImageInput').click()}
            >
              <img src={profileImage} id="profileImage" alt="Profile" />
              <input
                type="file"
                id="profileImageInput"
                accept="image/*"
                style={{ display:'none' }}
                onChange={handleProfileImageChange}
              />
              <div className="admin-name" id="adminName">{adminName}</div>
            </div>
          </div>

          {/* Sections */}
          {currentSection==='dashboard' && (
            <div className="section active">
              {/* Your dashboard content here */}
              <h2>Dashboard</h2>
              {/* You can insert your dashboard JSX here, similar to your previous static code */}
              <p>Dashboard Content...</p>
            </div>
          )}
          {currentSection==='Driver' && (
            <div className="section active" style={{ paddingTop:70 }}>
              {/* Driver info cards */}
              <h2>Driver Info & Orders</h2>
              {/* Example driver card */}
              <div style={{ padding:20 }}>
                {/* Driver 1 */}
                <div style={{ display:'flex', marginBottom:20 }}>
                  <img src="https://via.placeholder.com/80" alt="Driver" />
                  <div style={{ marginLeft:10 }}>
                    <h4>John Doe</h4>
                    <p>Contact: 123-456-7890</p>
                    <p>Plate: ABC-1234</p>
                    <p>Email: john@gmail.com</p>
                    <p>Ratings: 4.5 ★</p>
                    <p>Comments: Very punctual.</p>
                    <button onClick={() => alert("Past Deliveries for John")}>Past Deliveries</button>
                    <button onClick={() => alert("View docs for John")}>View Documents</button>
                  </div>
                </div>
                {/* Driver 2 */}
                <div style={{ display:'flex', marginBottom:20 }}>
                  <img src="https://via.placeholder.com/80" alt="Driver" />
                  <div style={{ marginLeft:10 }}>
                    <h4>Jane Smith</h4>
                    <p>Contact: 987-654-3210</p>
                    <p>Plate: XYZ-5678</p>
                    <p>Email: jane@gmail.com</p>
                    <p>Ratings: 4.8 ★</p>
                    <p>Comments: Great driver.</p>
                    <button onClick={() => alert("Past Deliveries for Jane")}>Past Deliveries</button>
                    <button onClick={() => alert("View docs for Jane")}>View Documents</button>
                  </div>
                </div>
              </div>
            </div>
          )}
          {currentSection==='Vendor' && (
            <div className="section active" style={{ paddingTop:70 }}>
              <h2>Vendor Management</h2>
              <button onClick={() => alert("Show all vendors")}>Show All Vendors</button>
            </div>
          )}

          {/* ALL MODALS as React components */}
          {showLogin && (
            <LoginModal
              onClose={() => setShowLogin(false)}
              onLogin={() => {
                // verify login
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();
                if (u==='crunchtimeadmin' && p==='crunchtimeadmin') {
                  alert('Login successful!');
                  setShowLogin(false);
                  setAdminName(u);
                } else {
                  alert('Invalid credentials');
                }
              }}
            />
          )}
          {showAdminPopup && (
            <AdminPopup
              onClose={() => setShowAdminPopup(false)}
              onSave={() => {
                const newU = document.getElementById('newUsername').value.trim();
                const newP = document.getElementById('newPassword').value.trim();
                if (newU && newP) {
                  setAdminName(newU);
                  alert('Credentials updated and email sent.');
                }
                setShowAdminPopup(false);
              }}
            />
          )}
          {showRolePopup && (
            <RolePopup onClose={() => setShowRolePopup(false)} />
          )}
          {showRoleInfoPopup && (
            <RoleInfoPopup
              role={currentRole}
              onClose={() => setShowRoleInfoPopup(false)}
            />
          )}
        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
